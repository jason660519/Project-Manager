<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mermaid Standalone Renderer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }
    #container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }
    #container svg {
      max-width: 100%;
      height: auto !important;
    }
  </style>
  <script src="./mermaid.min.js"></script>
</head>
<body>
  <div id="container"></div>

  <script>
    const RENDER_TIMEOUT_MS = 8000;

    function withTimeout(promise, timeoutMs) {
      let timeoutId;
      const timeout = new Promise((_, reject) => {
        timeoutId = setTimeout(() => {
          reject(new Error(`Mermaid render timed out after ${timeoutMs}ms`));
        }, timeoutMs);
      });
      return Promise.race([promise, timeout]).finally(() => {
        clearTimeout(timeoutId);
      });
    }

    // Initialize Mermaid with dark theme configurations to match Project Manager's design.
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'strict',
      htmlLabels: false,
      themeVariables: {
        background: 'transparent',
        primaryColor: 'rgb(110 231 183)',
        lineColor: 'rgb(110 231 183)'
      },
      // Suppress default console errors / alert boxes
      suppressConsoleErrors: true
    });

    window.addEventListener('message', async (event) => {
      const { type, code, id, requestId } = event.data || {};
      if (type !== 'render') return;

      const container = document.getElementById('container');
      container.innerHTML = '';

      try {
        // Render the diagram to SVG string.
        // In Mermaid, the first argument to render must be a unique ID starting with a letter.
        const { svg } = await withTimeout(
          mermaid.render(`mg-${id}-${requestId}`, code),
          RENDER_TIMEOUT_MS
        );
        
        container.innerHTML = svg;

        const reportSize = () => {
          const svgNode = container.querySelector('svg');
          const rect = (svgNode || container).getBoundingClientRect();
          const viewBoxHeight = svgNode && svgNode.viewBox && svgNode.viewBox.baseVal
            ? svgNode.viewBox.baseVal.height
            : 0;
          const height = Math.max(1, Math.ceil(rect.height || viewBoxHeight));
          window.parent.postMessage({ type: 'resize', height, id, requestId }, '*');
        };

        requestAnimationFrame(() => {
          setTimeout(reportSize, 50);
        });
      } catch (err) {
        // Extract a clean error string
        let errorMsg = err.message || String(err);
        
        // Remove internal Mermaid technical stack trace lines if possible for a cleaner UI error
        if (errorMsg.includes('Parse error')) {
          errorMsg = errorMsg.split('\n')[0];
        }

        window.parent.postMessage({ type: 'error', error: errorMsg, id, requestId }, '*');
      }
    });

    // Notify parent that the iframe is loaded and ready to accept render requests
    window.parent.postMessage({ type: 'ready' }, '*');
  </script>
</body>
</html>
