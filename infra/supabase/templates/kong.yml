# Placeholder Kong declarative config for F48.
#
# WARNING: with empty services/routes the gateway accepts connections on :8000
# but proxies NOTHING — every PM data-plane API call (auth, REST, storage,
# realtime) through http://kong:8000 will fail. This is intentional for the
# current scaffold: upstream services are provisioned by docker-compose, but
# gateway routing remains intentionally blocked until the complete Supabase
# self-hosted routing contract is added.
services: []
routes: []
consumers: []
