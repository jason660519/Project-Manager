# Optional TimescaleDB sidecar for time-series workloads.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.timescale.yml up -d
#
# Connect: postgresql://postgres:postgres-dev-password-change-me@localhost:54333/postgres

services:
  timescaledb:
    container_name: project-manager-timescaledb
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    ports:
      - "54333:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: timeseries
    volumes:
      - ./volumes/timescaledb/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timeseries"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb
